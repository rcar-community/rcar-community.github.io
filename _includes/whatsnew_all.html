{% include whatsnew_filter.html %}

<div id="whatsnew-config" data-items-per-page="{% if page.product %}5{% else %}10{% endif %}" style="display:none;"></div>
<ul class="whatsnew-list" id="whatsnew-all">
  {% assign items = site.data.whatsnew | sort: "date" | reverse %}
  {% if page.product %}
    {% assign items = items | where: "product", page.product %}
  {% endif %}
  {% for item in items %}
  {% include whatsnew_item.html %}
  {% endfor %}
</ul>

<button id="wn-more-btn">▼ more</button>

<script src="{{ '/assets/js/whatsnew.js' | relative_url }}" defer></script>
